<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');

        :root {
            --bg-deep: linear-gradient(180deg, #1a0000 0%, #3d0000 100%);
            --neon-gold: #ffcc00;
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body { 
            background: var(--bg-deep); 
            color: #fff; 
            text-align: center; 
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        #rainCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 10px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid var(--neon-gold);
        }
        #clock { font-size: 1.8rem; font-weight: 900; color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }
        #date { font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px; }

        .search-container { margin: 15px auto; max-width: 500px; padding: 0 10px; }
        .search-wrapper {
            display: flex; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue); border-radius: 10px; overflow: hidden;
        }
        #engine-select { background: #000; color: var(--neon-blue); border: none; padding: 8px; font-size: 12px; outline: none; cursor: pointer; }
        #search-input { flex: 1; background: transparent; border: none; padding: 10px; color: #fff; font-size: 14px; outline: none; }
        .search-btn { background: var(--neon-blue); color: #000; border: none; padding: 0 15px; font-weight: 900; cursor: pointer; }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            padding-bottom: 50px;
        }

        .card { 
            border-radius: 12px; overflow: hidden; 
            background: var(--glass); border: 1px solid rgba(255, 204, 0, 0.2);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
        
        .main-btn {
            width: 100%; padding: 15px; 
            background: linear-gradient(90deg, #2d0000, #4a0000);
            border: none; color: var(--neon-gold); font-size: 1.1rem; font-weight: 700; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; position: relative;
        }
        .main-btn::after { content: '▼'; position: absolute; right: 15px; font-size: 0.8rem; transition: 0.3s; }
        .main-btn.active::after { transform: rotate(180deg); }

        .content { max-height: 0; overflow: hidden; transition: 0.5s ease; background: rgba(0,0,0,0.7); }
        .link-grid { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sub-btn {
            background: linear-gradient(145deg, #ffcc00, #ff9900);
            color: #000; text-decoration: none; padding: 8px 2px; border-radius: 6px;
            font-size: 11px; font-weight: 800; border-bottom: 2px solid #663300;
            display: block;
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
            #clock { font-size: 1.5rem; }
        }
    </style>
</head>

    const container = document.getElementById('mainContainer');
    sections.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <button class="main-btn" onclick="toggle(this)">${s.title}</button>
            <div class="content">
                <div class="link-grid">
                    ${s.links.map(l => `<a href="${l[1]}" target="_blank" class="sub-btn">${l[0]}</a>`).join('')}
                </div>
            </div>
        `;
        container.appendChild(card);
    });

    function toggle(btn) {
        const content = btn.nextElementSibling;
        btn.classList.toggle('active');
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
    }

    function executeSearch() {
        const engine = document.getElementById('engine-select').value;
        const query = document.getElementById('search-input').value;
        if(query) window.open(engine + encodeURIComponent(query), '_blank');
    }
    function handleSearch(e) { if(e.key === 'Enter') executeSearch(); }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true});
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
    }
    setInterval(updateClock, 1000);
    updateClock();

    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array.from({length: 100}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, len: Math.random()*20, speed: Math.random()*7+3}));
    function drawRain() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(0, 242, 255, 0.3)";
        ctx.lineWidth = 1.2;
        drops.forEach(d => {
            ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len); ctx.stroke();
            d.y += d.speed; if (d.y > canvas.height) d.y = -20;
        });
        requestAnimationFrame(drawRain);
    }
    drawRain();
</script>

    <script>
        function toggle(btn) {
            var panel = btn.nextElementSibling;
            if (panel.style.maxHeight) {
                panel.style.maxHeight = null;
                btn.querySelector("i:last-child").className = "fa-solid fa-chevron-down";
            } else {
                panel.style.maxHeight = panel.scrollHeight + "px";
                btn.querySelector("i:last-child").className = "fa-solid fa-chevron-up";
            }
        }

        const pTimes = [
            {n: "ফজর", t: "04:15"}, {n: "যোহর", t: "12:15"}, 
            {n: "আসর", t: "16:40"}, {n: "মাগরিব", t: "18:35"}, {n: "এশা", t: "19:55"}
        ];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('bn-BD', {hour12: false});

            let next = pTimes[0];
            for (let p of pTimes) {
                let [h, m] = p.t.split(':');
                let target = new Date(); target.setHours(h, m, 0);
                if (target > now) { next = p; break; }
            }

            document.getElementById('p-name').innerText = next.n;
            let [th, tm] = next.t.split(':');
            let tDate = new Date(); tDate.setHours(th, tm, 0);
            let diff = tDate - now;
            if (diff < 0) diff += 86400000;

            let hh = Math.floor(diff/3600000);
            let mm = Math.floor((diff%3600000)/60000);
            let ss = Math.floor((diff%60000)/1000);
            document.getElementById('p-timer').innerText = 
                (hh < 10 ? '০' : '') + hh.toLocaleString('bn-BD') + ":" + 
                (mm < 10 ? '০' : '') + mm.toLocaleString('bn-BD') + ":" + 
                (ss < 10 ? '০' : '') + ss.toLocaleString('bn-BD');
        }
        setInterval(updateClock, 1000);
        updateClock();

    </script>
